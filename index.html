<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CRM-дашборд | KrasAuto</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .dashboard-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            height: 100%;
        }
        .stat-card h3 {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
        }
        .stat-card i {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .chart-container {
            position: relative;
            min-height: 220px;
        }
        /* Компактная таблица — без горизонтальной прокрутки */
        .table-container {
            overflow-x: visible;
        }
        .table {
            font-size: 12px;
            margin-bottom: 0;
        }
        .table th, .table td {
            padding: 8px 6px;
            white-space: nowrap;
        }
        /* На мобилках убираем некоторые столбцы */
        @media (max-width: 768px) {
            .table .hide-mobile {
                display: none;
            }
            .stat-card .value { font-size: 20px; }
            h1 { font-size: 1.4rem; }
            .dashboard-card { padding: 15px; }
        }
        @media (max-width: 576px) {
            .table .hide-small {
                display: none;
            }
        }
        .status-badge {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
            white-space: nowrap;
        }
        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            margin-top: 20px;
        }
        .error-message {
            background: #fce8e6;
            color: #c5221f;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        h1 {
            color: white;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 15px;
        }
        /* Для очень маленьких экранов — карточки статистики в 2 ряда */
        @media (max-width: 480px) {
            .stat-card .value { font-size: 18px; }
            .stat-card h3 { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-3">
        <h1><i class="bi bi-graph-up"></i> KrasAuto CRM</h1>
        <div class="subtitle">Автоматизация заявок и аналитика</div>
    </div>
    
    <div class="text-center">
        <button class="refresh-btn" onclick="loadData()">
            <i class="bi bi-arrow-repeat"></i> Обновить
        </button>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <!-- Статистика 4 карточки -->
    <div class="row g-2 mb-4" id="stats">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <i class="bi bi-calendar-check"></i>
                <h3>Всего заявок</h3>
                <div class="value" id="totalCount">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <i class="bi bi-sun"></i>
                <h3>За сегодня</h3>
                <div class="value" id="todayCount">0</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <i class="bi bi-currency-ruble"></i>
                <h3>Доход</h3>
                <div class="value" id="totalRevenue">0 ₽</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <i class="bi bi-receipt"></i>
                <h3>Средний чек</h3>
                <div class="value" id="avgCheck">0 ₽</div>
            </div>
        </div>
    </div>
    
    <!-- Графики -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-6">
            <div class="dashboard-card">
                <h6><i class="bi bi-calendar-week"></i> Заявки по дням</h6>
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="dashboard-card">
                <h6><i class="bi bi-pie-chart"></i> По направлениям</h6>
                <div class="chart-container">
                    <canvas id="businessChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="dashboard-card">
                <h6><i class="bi bi-people"></i> Загрузка мастеров</h6>
                <div class="chart-container">
                    <canvas id="mastersChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="dashboard-card">
                <h6><i class="bi bi-cash-stack"></i> Доход по услугам</h6>
                <div class="chart-container">
                    <canvas id="servicesChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Таблица заявок (компактная) -->
    <div class="dashboard-card">
        <h6><i class="bi bi-table"></i> Все заявки</h6>
        <div class="table-container">
            <table class="table table-hover table-sm" id="dataTable">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Бизнес</th>
                        <th>Услуга</th>
                        <th class="hide-mobile">Мастер</th>
                        <th class="hide-small">Клиент</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="text-center">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="footer">
        <i class="bi bi-google"></i> Google Sheets | Обновление: 30 сек
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-IC3RzABOwOMpdeeMYA4E-d3xdylxTBNS_bQXcDtGG1YI-aDRQ7kky3m2C0z-MkXYiKGgyRJbvvjr/pub?output=csv";
    
    let dailyChart, businessChart, mastersChart, servicesChart;
    
    async function loadData() {
        const errorDiv = document.getElementById('errorMessage');
        const tableBody = document.getElementById('tableBody');
        
        try {
            tableBody.innerHTML = '<tr><td colspan="7" class="text-center"><i class="bi bi-hourglass-split"></i> Загрузка...</td></tr>';
            errorDiv.style.display = 'none';
            
            const url = CSV_URL + '&nocache=' + Date.now();
            const response = await fetch(url);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const csvText = await response.text();
            
            if (csvText.includes('<!DOCTYPE') || csvText.includes('Sign in')) {
                throw new Error('Таблица не опубликована как CSV');
            }
            
            const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
            const data = parsed.data;
            const validData = data.filter(row => row['Дата'] && row['Дата'].trim() && row['Дата'] !== 'Дата');
            
            updateStats(validData);
            updateCharts(validData);
            updateTable(validData);
            
        } catch (error) {
            console.error('Ошибка:', error);
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `<i class="bi bi-exclamation-triangle"></i> ${error.message}`;
            tableBody.innerHTML = '<tr><td colspan="7" class="text-center">❌ Ошибка</td></tr>';
        }
    }
    
    function updateStats(data) {
        const total = data.length;
        const today = new Date().toISOString().slice(0,10);
        const todayData = data.filter(row => row['Дата'] && row['Дата'].startsWith(today));
        
        let totalRevenue = 0;
        data.forEach(row => {
            let price = parseInt(String(row['Сумма']).replace(/[^0-9]/g, '')) || 0;
            totalRevenue += price;
        });
        
        document.getElementById('totalCount').innerText = total;
        document.getElementById('todayCount').innerText = todayData.length;
        document.getElementById('totalRevenue').innerText = totalRevenue.toLocaleString() + ' ₽';
        document.getElementById('avgCheck').innerText = total > 0 ? Math.round(totalRevenue/total).toLocaleString() + ' ₽' : '0 ₽';
    }
    
    function updateCharts(data) {
        const dailyMap = new Map();
        data.forEach(row => {
            const date = row['Дата']?.split(' ')[0];
            if (date) dailyMap.set(date, (dailyMap.get(date) || 0) + 1);
        });
        const sortedDates = Array.from(dailyMap.keys()).sort();
        const dailyCounts = sortedDates.map(d => dailyMap.get(d));
        
        if (dailyChart) dailyChart.destroy();
        const dailyCtx = document.getElementById('dailyChart')?.getContext('2d');
        if (dailyCtx) {
            dailyChart = new Chart(dailyCtx, {
                type: 'line', 
                data: { labels: sortedDates, datasets: [{ label: 'Заявки', data: dailyCounts, borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.1)', tension: 0.3, fill: true }] }
            });
        }
        
        const businessMap = new Map();
        data.forEach(row => { const biz = row['Бизнес']; if (biz) businessMap.set(biz, (businessMap.get(biz) || 0) + 1); });
        if (businessChart) businessChart.destroy();
        const businessCtx = document.getElementById('businessChart')?.getContext('2d');
        if (businessCtx && businessMap.size > 0) {
            businessChart = new Chart(businessCtx, {
                type: 'pie', 
                data: { labels: Array.from(businessMap.keys()), datasets: [{ data: Array.from(businessMap.values()), backgroundColor: ['#667eea', '#34a853', '#fbbc04', '#ea4335'] }] }
            });
        }
        
        const mastersMap = new Map();
        data.forEach(row => { const master = row['Мастер']; if (master) mastersMap.set(master, (mastersMap.get(master) || 0) + 1); });
        if (mastersChart) mastersChart.destroy();
        const mastersCtx = document.getElementById('mastersChart')?.getContext('2d');
        if (mastersCtx) {
            mastersChart = new Chart(mastersCtx, {
                type: 'bar', 
                data: { labels: Array.from(mastersMap.keys()), datasets: [{ label: 'Записей', data: Array.from(mastersMap.values()), backgroundColor: '#34a853', borderRadius: 8 }] }
            });
        }
        
        const servicesMap = new Map();
        data.forEach(row => {
            const service = row['Услуга'];
            let price = parseInt(String(row['Сумма']).replace(/[^0-9]/g, '')) || 0;
            if (service) servicesMap.set(service, (servicesMap.get(service) || 0) + price);
        });
        if (servicesChart) servicesChart.destroy();
        const servicesCtx = document.getElementById('servicesChart')?.getContext('2d');
        if (servicesCtx) {
            servicesChart = new Chart(servicesCtx, {
                type: 'bar', 
                data: { labels: Array.from(servicesMap.keys()), datasets: [{ label: 'Доход (₽)', data: Array.from(servicesMap.values()), backgroundColor: '#fbbc04', borderRadius: 8 }] }
            });
        }
    }
    
    function updateTable(data) {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">📭 Нет данных. Сделайте запись через бота.</td></tr>';
            return;
        }
        
        data.slice().reverse().forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="white-space: nowrap;">${row['Дата']?.split(' ')[0] || ''}</td>
                <td>${row['Бизнес'] || ''}</td>
                <td>${(row['Услуга'] || '').substring(0, 20)}${(row['Услуга'] || '').length > 20 ? '…' : ''}</td>
                <td class="hide-mobile">${(row['Мастер'] || '').substring(0, 15)}</td>
                <td class="hide-small">${row['Клиент'] || ''}</td>
                <td style="white-space: nowrap;">${row['Сумма'] || ''}</td>
                <td><span class="status-badge">${row['Статус'] || 'Новая'}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }
    
    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
